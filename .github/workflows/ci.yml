name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # No `version:` — action-setup@v4 reads the exact pin from
        # package.json's `packageManager` field, which keeps CI in lockstep
        # with the version developers run locally. Pinning a floating major
        # here (e.g. `version: 10`) drifts as new 10.x ships, and pnpm 10's
        # `--frozen-lockfile` enforces the packageManager field strictly.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Enforce coverage threshold
        run: tsx scripts/check-coverage.ts

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage/lcov.info
          if-no-files-found: error
